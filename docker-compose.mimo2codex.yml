# mimo2codex Docker Compose
# 构建并运行：docker compose up -d
# 停止：docker compose down
# 查看日志：docker compose logs -f

version: '3.8'

services:
  mimo2codex:
    build:
      context: .
      dockerfile: Dockerfile.mimo2codex
    container_name: mimo2codex
    ports:
      - "8788:8788"
    environment:
      - MIMO_API_KEY=${MIMO_API_KEY}  # 从 .env 文件或环境变量读取
      - MIMO2CODEX_AUTH=on
      # 可选：其他环境变量
      # - DS_API_KEY=${DS_API_KEY}
      # - GENERIC_BASE_URL=${GENERIC_BASE_URL}
      # - GENERIC_API_KEY=${GENERIC_API_KEY}
      # - GENERIC_DEFAULT_MODEL=${GENERIC_DEFAULT_MODEL}
    volumes:
      - mimo2codex-data:/root/.mimo2codex
    restart: unless-stopped

volumes:
  mimo2codex-data: